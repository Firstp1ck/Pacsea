name: Release

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            asset: pacsea
          - runner: ubuntu-24.04-arm
            asset: pacsea-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libwayland-dev \
            libwayland-client0 \
            libwayland-egl1

      - name: Build Release
        run: cargo build --release

      - name: Stage binary for upload
        run: cp target/release/pacsea "${{ matrix.asset }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish-release:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release-files
          merge-multiple: true

      - name: Get tag name and check prerelease
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          if [ "$MAJOR" -lt 1 ] 2>/dev/null; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: |
            release-files/pacsea
            release-files/pacsea-aarch64
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
